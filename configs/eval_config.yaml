model:
  checkpoint_path: checkpoints/checkpoint_best.pt
  context_length: 512
  vocab_size: 65536
  d_model: 384
  num_layers: 8
  num_heads: 8
  d_ff: 1536
  theta: 10000.0

data:
  valid: data/valid

training:
  num_epochs: 30
  batch_size: 16
  learning_rate: 2.0e-4
  weight_decay: 0.3
  warmup_steps: 1000
  lr_decay_steps: 100000
  gradient_clip: 1.0

evaluation:
  batch_size: 32

generation:
  prompt: "从前有座山"
  max_new_tokens: 200
  temperature: 0.7
  top_k: 30
  top_p: 0.9
  repetition_penalty: 1.1

output:
  log_file: eval_results.log
  tokenizer_config_path: configs/tokenizer_config.json
