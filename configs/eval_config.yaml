model:
  checkpoint_path: checkpoints/checkpoint_best.pt
  context_length: 512
  vocab_size: 65536
  d_model: 128
  num_layers: 2
  num_heads: 2
  d_ff: 512
  theta: 10000.0

data:
  valid: data/valid

training:
  num_epochs: 50
  batch_size: 32
  learning_rate: 6.0e-4
  weight_decay: 0.1
  warmup_steps: 1000
  lr_decay_steps: 100000
  gradient_clip: 1.0

evaluation:
  batch_size: 64

generation:
  prompt: "Once upon a time"
  max_new_tokens: 400
  temperature: 0.8
  top_k: 50

output:
  log_file: eval_results.log
  tokenizer_config_path: configs/tokenizer_config.json
